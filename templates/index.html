<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check System</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div class="title-section">
            <h1>🤖 Check System</h1>
            <p class="subtitle">Monitoring et Administration Système</p>
          </div>
          <div class="quick-stats" id="quickStats">
            <div class="stat-item">
              <span class="stat-icon">⚙️</span>
              <span class="stat-value" id="cpuQuick">--</span>
              <span class="stat-label">CPU</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">🧠</span>
              <span class="stat-value" id="ramQuick">--</span>
              <span class="stat-label">RAM</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">💾</span>
              <span class="stat-value" id="diskQuick">--</span>
              <span class="stat-label">Disque</span>
            </div>
          </div>
        </div>
      </header>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
